# BIN1 d8 cMyo 100x confocal — BIN1 RNA-FISH + (RNA2 / protein) co-stain.
# Differentiated day-8 cardiomyocyte (d8cMyo) BIN1 KO vs WT comparison.
#
# Source images: F:\Raw Images\BIN1\20251029_d8cMyo_BIN1-RNAFISH\20251029_d8cMyo_BIN1-RNAFISH\
# Output convention: F:\Image Analysis Work\BIN1\Run<N>\
#
# Metadata (confirmed from BioImage on WT BIN1-100x01.vsi):
#   4 channels: ch0=640 CSU (Cy5), ch1=561 CSU (Cy3), ch2=488 CSU, ch3=405 CSU
#   87 z-slices, 1152x1152 px
#   Pixel size: 0.13 µm/px (2x H9's 0.065 — different objective/binning)
#   Z step: 0.21 µm
#
# Nucleus size at 0.13 µm/px: cardiomyocyte nucleus ~10-15 µm → ~77-115 px
# diameter → ~4600-10400 px² area. min_area_px set accordingly.
#
# Channel-to-role mapping for rna_rna:
#   ch 0 = 640 (Cy5)  → RNA1 (BIN1 FISH)
#   ch 1 = 561 (Cy3)  → RNA2 (second RNA — adjust label below)
#   ch 2 = 488        → Protein (unused in rna_rna)
#   ch 3 = 405        → DAPI

experiment:
  name: "BIN1_d8cMyo_rna_rna"
  description: "BIN1 d8 cardiomyocyte RNA-FISH (rna_rna, KO vs WT)"
  cell_line: "d8 cardiomyocyte"

conditions:
  mode: subfolders
  subfolder_conditions:
    KO: "KO"
    WT: "WT"
  # 2nd Ab only files = secondary-only controls (no primary FISH probe).
  sec_only_files:
    - "KO 2nd Ab only-100x05.vsi"
    - "KO 2nd Ab only-100x05 (decon).vsi"
    - "WT 2nd Ab only-100x08.vsi"
    - "WT 2nd Ab only-100x08 (decon).vsi"
  sec_only_folders: []
  condition_order: ["WT", "KO"]
  min_nuclei_for_stats: 6

channels:
  analysis_mode: rna_rna
  dapi: 3
  rna: 0
  rna2: 1
  antibody: 2
  # Edit these labels to match the actual probes / antibodies used:
  # 2026-05-13 Brian: this dataset is an exon-vs-intron FISH design.
  # 647/Cy5 targets BIN1 EXONS (mature + nascent transcripts);
  # 561/Cy3 targets BIN1 INTRONS (nascent pre-mRNA only).
  # Expect: exon ∩ intron coloc = active transcription sites (nuclear);
  # exon-only = mature mRNA (predominantly cytoplasmic).
  dapi_label: "DAPI"
  # 2026-05-19 Brian's PI: ch0 (640/647 nm) = Introns; ch1 (561 nm) = Exons.
  # Running per PI's labeling. Note: ch0 shows lots of cytoplasmic spots
  # (~2000 per image) which doesn't match standard intron biology — would
  # expect only nuclear nascent pre-mRNA foci. Flag for double-check.
  # 2026-05-19 PI's labeling (final deliverable to send to PI):
  # ch0/640 = Introns, ch1/561 = Exons.
  rna_label: "Introns"
  rna2_label: "Exons"
  antibody_label: "Protein-488"
  # 2026-05-20 Per Sam: WAVELENGTH-based color convention. 647 always
  # rendered yellow, 568/561 always magenta — regardless of which probe
  # (Exons / Introns) lives on which channel. With ch0=640/647=Introns,
  # this means Introns → yellow and Exons → magenta.
  rna_lut: "yellow"     # ch0 = 640/647 → yellow (Sam's convention)
  rna2_lut: "magenta"   # ch1 = 561/568 → magenta

z_stack:
  # 2026-05-18 Brian: autofocus over 35-60. No maxproj (collapses spots in z).
  # Per-channel autofocus picks the best in-focus plane per channel within
  # this window using normalized Laplacian variance.
  mode: autofocus
  start_slice: 35
  end_slice: 60

nuclei:
  backend: stardist
  cellpose_model_type: nuclei
  cellpose_diameter_px: 110.0
  cellpose_flow_threshold: 0.4
  cellpose_cellprob_threshold: 0.0
  # 2026-05-14 Run 2 diagnosis: WT BIN1 image found only 1 of ~30 visible
  # nuclei at prob=0.4. The DAPI in real-probe BIN1 images is markedly
  # dimmer than the sec-only WT (which detected 21/30). Dropping to 0.2
  # to catch dim nuclei.
  # 2026-05-19 Brian: 0.25 → 0.3 — tighten further to drop a couple of
  # low-confidence "nuclei" that visual inspection suggested might be
  # debris / out-of-focus blur. 0.3 is still permissive enough to catch
  # the dim cMyo nuclei.
  prob_threshold: 0.3
  nms_threshold: 0.3
  stardist_model: 2D_versatile_fluo
  stardist_gauss_sigma: 1.5
  stardist_postprocess: watershed_otsu
  stardist_postprocess_otsu_sigma: 2.0
  stardist_postprocess_mask_closing_px: 8
  label_smoothing_radius_px: 5
  # 2x larger px → 4x smaller area. H9 had min_area=10000; BIN1 should be ~3000-4000.
  # 2026-05-14 Run 2 diagnosis: visible nuclei in BIN1 are smaller than
  # estimated — many are 40-50 px diameter (1300-2000 px²). Dropping
  # 3500 → 1500 (≈ 44 px = 5.7 µm circular floor). Label smoothing
  # will still merge over-fragmented bits via the disk SE.
  min_area_px: 1500
  exclude_border: true
  border_margin_px: 5

pixel_coloc:
  threshold_mode: mad
  threshold_scope: batch
  k_mad: 2.5

foci:
  enabled: true
  backend: bigfish
  bigfish_voxel_size_nm: 0.0   # 0 = auto-detect (130 nm expected)
  bigfish_voxel_z_nm: 0.0      # 0 = auto-detect (210 nm expected)
  # PSF radius at 0.13 µm/px, NA ~1.4-1.5, 668 nm Cy5 emission ≈ 2.1 px = 270 nm.
  # 130 nm = 1 px (sub-diffraction tight filter); raise to 200-250 nm if spots
  # look undersized.
  bigfish_spot_radius_nm: 130.0
  bigfish_spot_radius_z_nm: 300.0
  # 2026-05-20 Brian: bumped to 1.0 (= BigFISH auto-thresh with no scaling).
  # This is the "v3 / strict-detection" setting that Brian shipped to the PI.
  threshold_multiplier: 1.0
  only_nuclear_spots: false
  min_sep_px: 1
  rna_overrides: {}
  rna2_overrides: {}

cytoplasm:
  enabled: true
  # 2026-05-19 Brian: shrink from 80 → 40 px (~5.2 µm at 0.13 µm/px).
  # Tighter Voronoi cap keeps the cytoplasm region closer to each nucleus
  # so cytoplasmic spot counts don't bleed into neighboring cells'
  # territories in dense fields.
  voronoi_max_expansion_px: 40
  measure_nc_ratio: true

output:
  save_qc_overlays: true
  save_per_image_csv: true
  save_masks: true
  save_publication_images: true
  # 2026-05-18 Brian: PNG-only — TIFs doubled the publication_images dir
  # and Brian rarely opens them. Flip to true if you need 16-bit RGB for
  # Illustrator / Fiji figure assembly.
  save_publication_tifs: false
  # 2026-05-19 Brian: switched from auto_batch to MANUAL. Brian's eye on
  # the histogram in Fiji says floor ~700 for RNA1 (exons / Cy5) and ~800
  # for RNA2 (introns / Cy3) is the right cut. Ceilings picked from the
  # spread of recent auto values + small headroom so the brightest single-
  # molecule spots saturate but a fraction below them shows pop. Same
  # numbers applied to every image so WT/KO + real/sec-only are directly
  # comparable.
  # 2026-05-20 v3 settings (the version Brian shipped to PI):
  # ch0/647/Introns: Min 675, Max 1350
  # ch1/561/Exons:   Min 825, Max 1650
  # Paired with threshold_multiplier=1.0 (stricter BigFISH LoG above).
  pub_contrast_mode: manual
  manual_rna_min: 675.0
  manual_rna_max: 1350.0
  manual_rna2_min: 825.0
  manual_rna2_max: 1650.0
  # 2026-05-20 Brian: turn ON the pub-contrast-floor-as-analysis-floor so
  # the pixel-intensity quantification columns reflect what the eye sees.
  apply_pub_contrast_floor_to_analysis: true
  # 2026-05-20 Brian: ALSO turn ON the pub-contrast-floor-as-spot-detection
  # floor. BigFISH still runs LoG detection unchanged (with the new
  # threshold_multiplier=0.8), but spots whose peak intensity falls below
  # the channel's manual floor (rna=675, rna2=825) are dropped post-
  # detection. Same "what the eye sees" cut applied to spot counts.
  apply_pub_contrast_floor_to_spots: true
  # 2026-05-19 Brian: pin DAPI a bit higher to crisp up cellular DAPI
  # background. Prior auto-batch derived ~900 floor — bumping to 1200 to
  # clip diffuse cytoplasmic autofluorescence without losing the bright
  # nuclear cores. Ceiling stays wide (DAPI has the largest dynamic range).
  manual_dapi_min: 1200.0
  manual_dapi_max: 30000.0
  prefix: ""

parallel:
  workers: auto

# Limit to 100x files; skip 320x (different magnification, different field
# of view — would skew aggregate stats). 4 files: 1 WT real + 1 WT sec +
# 1 KO real + 1 KO sec.
#
# 2026-05-20 Brian: DECON ONLY — running decon and non-decon together
# double-counts (they're two processed versions of the SAME acquisition).
# 4 files: 1 WT real + 1 WT sec + 1 KO real + 1 KO sec.
input_file_subset:
  - "KO 2nd Ab only-100x05 (decon).vsi"
  - "KO BIN1-100x02 (decon).vsi"
  - "WT 2nd Ab only-100x08 (decon).vsi"
  - "WT BIN1-100x01 (decon).vsi"
