experiment:
  name: HEK293_60x
  cell_line: HEK293
conditions:
  mode: auto
channels:
  analysis_mode: rna_only
z_stack:
  mode: maxproj
nuclei:
  backend: stardist
  prob_threshold: 0.479
  stardist_gauss_sigma: 1.0
  stardist_postprocess: watershed_otsu
  min_area_px: 1500
foci:
  backend: bigfish
  bigfish_spot_radius_nm: 180.0
  threshold_multiplier: 1.0
output:
  save_qc_overlays: true
parallel:
  workers: auto
