# ============================================================================
# MIAT (561 FISH) x QKI (640 IF) COLOCALIZATION — H9 hESC — MIAT-ASO KD vs NT
# MAIN single-plane set ONLY  |  HYBRID QKI readout  |  rna_protein
# Date: 2026-07-04  |  fishsuite-config subagent (Opus 4.8 HIGH) for MASTER CONTROL
# Brian locked the design decisions 2026-07-04. DO-NOT-RUN artifact: config only.
# ============================================================================
# PURPOSE
#   Colocalization of MIAT (RNA-FISH, 561) with QKI (IF, 640) in undifferentiated
#   H9 hESC, MIAT-ASO knockdown (KD) vs non-targeting (NT). This preset covers the
#   MAIN single-plane acquisition ONLY (the z-stack sets are a SEPARATE later run).
#   The 7SK x QKI wells (9,10) are a SEPARATE preset
#   (sk7_qki_MAIN_singleplane_HYBRID_2026-07-04.yaml) — different RNA target on the
#   561 channel; do NOT mix. QKI-640 is the shared IF partner across both presets.
#
#   Human / Homo sapiens (H9 hESC). No GPU/no pipeline was run to build this file.
#
# ── HYBRID QKI READOUT (Brian 2026-07-04) ────────────────────────────────────
#   The reality-check (REALITYCHECK_REPORT.md) shows QKI-640 as a FINE GRANULAR
#   nuclear FILL (not classic discrete puncta) but WITH some visibly brighter
#   foci. So we run BOTH readouts in one pass:
#     (1) DIFFUSE INTENSITY (robust headline): QKI raw local intensity at each
#         MIAT spot + random-position null + rotation "proper-background" null,
#         with nucleolar voids excluded. This is the trusted coloc statistic.
#     (2) LOOSE QKI SPOT-DETECT (complementary hedge): detect_antibody_spots:true
#         with a LENIENT antibody threshold (tm=1.0) so we ALSO get MIAT x QKI
#         spot-pairing metrics (paired_fraction, nn_distance, active-TSS overlap).
#   CRITICAL specificity guard: detect_in_sec_only:true reports QKI (and MIAT)
#   spot counts in the secondary-only wells (7,12) so the NON-SPECIFIC QKI spot
#   rate is quantified — the loose QKI spots are only meaningful above that floor.
#   The reality-check flagged sec-only QKI as a structured ~3-4x-over-background
#   speckle (NOT empty), so this guard is essential.
#
# ── CHANNELS (OME-verified in inventory + reality-check) ─────────────────────
#   On-disk channel order is REVERSED vs ascending wavelength — set indices
#   EXPLICITLY (a hand-written ascending-order guess would be backwards):
#     ch0 = "640 CSU" (668 nm) -> QKI IF (antibody)  -> antibody=0  (YELLOW LUT)
#     ch1 = "561 CSU" (603 nm) -> MIAT FISH (RNA)     -> rna=1       (MAGENTA LUT)
#     ch2 = "405 CSU" (442 nm) -> DAPI                -> dapi=2      (BLUE LUT)
#   NOTE the wavelength flip vs the older UD MIAT-QKI presets (there MIAT was on
#   640 and QKI on 561). Here MIAT=561, QKI=640. LUTs are set by WAVELENGTH.
#   3 channels, 1152x1152, 0.13 um/px XY, Z=1 (single plane) on every MAIN file.
#
# ── SINGLE-PLANE (verification B) ────────────────────────────────────────────
#   ALL 55 MAIN .vsi are Z=1 (confirmed by opening every file, inventory §4).
#   mode:autofocus on a 1-slice stack simply returns the sole plane, used as
#   acquired (core/io.py _autofocus_plane_with_idx returns plane 0 for nz=1).
#   No start_slice/end_slice needed; the ±10% edge guard is irrelevant at nz=1.
#
# ── DISCOVERY / -i (verification A — CODE-VERIFIED against core/io.py) ────────
#   discover_inputs walks EXACTLY 2 levels: immediate child DIRS of -i, then the
#   files DIRECTLY inside each child dir (io.py L952-958). It does NOT recurse
#   into grandchild dirs, and it SKIPS any dir/file whose name starts with "_".
#   Consequence for -i = "F:\Raw Images\Confocal Imaging\MIAT-ASO-KD":
#     * the 12 MAIN well folders yield their .vsi directly -> DISCOVERED, labelled
#       by their well-folder name (subfolder mode).
#     * "oldbad-z-stacks\" and "Real-zstacks\" appear as child dirs but their .vsi
#       live one level DEEPER (inside per-well subfolders), so ZERO files are
#       pulled from them — the z-stacks are auto-excluded by the 2-level walk.
#     * top-level "_temp\" is skipped (leading "_").
#   => Pointing -i at the MAIN root is ALREADY SAFE re: z-stacks. input_file_subset
#      below is nevertheless pinned as a belt-and-suspenders guard AND is
#      LOAD-BEARING for the MIAT-vs-7SK split (both sets share the same root; only
#      the subset separates wells 1-6,8,11 from 9,10). Subset matches by BARE
#      BASENAME (runner.py L299-309). MAIN/oldbad/Real basenames share no collision
#      (distinct prefixes: "ASO_NT_MIAT-KD_..." vs "ASO_MIATKD-NT-zstack__..." vs
#      "zstack__..."), so the pin is unambiguous.
#   RUN WITH:  -i "F:\Raw Images\Confocal Imaging\MIAT-ASO-KD"  -p 1   (fishproc_dml)
#
# ── STATS: WELL = BIOLOGICAL REPLICATE (Brian 2026-07-04) ────────────────────
#   subfolder_conditions maps each MAIN well folder to a PER-WELL label carrying
#   its NT/KD prefix (NT_w1 ... KD_w11). Each well collapses to one mean; NT-vs-KD
#   on well-means is done downstream. Sec-only wells 7,12 -> sec_only_folders (NOT
#   a biological condition; they are forced to the "Sec-Only" label by _add()).
#   min_nuclei_for_stats: 6.
#
# ── INTENSITY COMPARABILITY / FLOORS ─────────────────────────────────────────
#   Exposure is identical across all wells (640=0.7s, 561=0.7s, 405=0.5s; reality-
#   check §D), so manual floors (Sam's method) are used and pixel-coloc uses BATCH
#   scope. CAVEAT (reality-check §D): laser %/gain are NOT recorded in the OME
#   metadata, so absolute cross-well comparability is PROBABLE-not-proven; if a
#   downstream check shows a well-to-well offset, switch pixel_coloc.threshold_scope
#   to per_image and/or normalize to the sec-only floor. ALL manual_* floors below
#   are __TUNE__ starting values derived from the reality-check percentiles
#   (min~p50, max~p99.9 of the relevant channel); TUNE on the strongest well by eye
#   before locking. The QKI (antibody/rna2) + DAPI floors are kept IDENTICAL to the
#   7SK preset so the shared QKI partner is displayed comparably across both.
# ============================================================================

experiment:
  name: "MIAT_QKI_MAIN_singleplane_HYBRID_2026-07-04"
  description: "MIAT(561 FISH) x QKI(640 IF) rna_protein coloc, H9 hESC, MIAT-ASO KD vs NT. MAIN single-plane set only (z-stacks are a separate run). HYBRID QKI: diffuse QKI-intensity-at-MIAT null enrichment (position + rotation proper-background nulls, nucleolus-excluded) as the headline PLUS a LOOSE QKI spot-detect (detect_antibody_spots:true, antibody tm=1.0) for complementary MIAT x QKI spot-pairing; detect_in_sec_only:true quantifies the non-specific QKI/MIAT spot rate in sec-only wells 7,12. Channels ch0/640=QKI(antibody), ch1/561=MIAT(rna), ch2/405=DAPI (indices explicit; reversed vs ascending-wavelength). Single in-focus plane (mode=autofocus; every MAIN file is Z=1, used as acquired). Well=biological replicate (subfolder_conditions NT_w#/KD_w#). Manual comparable floors (Sam's method, all TUNE) + batch pixel-coloc. Single-process (compute_partner_intensity). -i at MIAT-ASO-KD root is safe (2-level discovery excludes the deeper z-stack folders); input_file_subset pins the 40 MAIN MIAT+sec-only .vsi as a guard and to split MIAT from 7SK."
  cell_line: "H9 hESC (undifferentiated)"
  date: "2026-07-04"

conditions:
  mode: subfolders
  # WELL = biological replicate. Each MAIN well folder -> a per-well NT/KD label.
  # Wells 9,10 (7SK) are deliberately NOT listed here and are excluded by
  # input_file_subset (they belong to the sibling 7SK preset). Even if discovery
  # sees them (it does, at -i=root), the subset filter drops them before analysis.
  subfolder_conditions:
    "FolderNT-well1-MIAT565-QKI647_Experiment_20260703": "NT_w1"
    "FolderNT-well2-MIAT-QKI_Experiment_20260703": "NT_w2"
    "FolderNT-well3-MIAT-QKI_Experiment_20260703": "NT_w3"
    "FolderNT-well8-MIAT-QKI_Experiment_20260703": "NT_w8"
    "FolderKD-well4-MIAT-QKI_Experiment_20260703": "KD_w4"
    "FolderKD-well5-MIAT-QKI_Experiment_20260703": "KD_w5"
    "FolderKD-well6-MIAT-QKI_Experiment_20260703": "KD_w6"
    "FolderKD-well11-MIAT-QKI_Experiment_20260703": "KD_w11"
  # Secondary-only controls: NOT a biological condition. Forced to "Sec-Only".
  sec_only_folders:
    - "FolderNT-well7-seconly_Experiment_20260703"
    - "FolderKD-well12-seconly_Experiment_20260703"
  sec_only_files: []
  filename_conditions: []
  condition_order:
    - "NT_w1"
    - "NT_w2"
    - "NT_w3"
    - "NT_w8"
    - "KD_w4"
    - "KD_w5"
    - "KD_w6"
    - "KD_w11"
  min_nuclei_for_stats: 6

